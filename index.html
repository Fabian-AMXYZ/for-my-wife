<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <title>Letters | To My Wife</title>
    <link rel="stylesheet" href="letters.css">
</head>

<body>

    <!-- Homepage Selection Screen -->
    <div id="homepage" class="home-screen">
        <div class="home-content">
            <img src="img/IMG_0794.jpg"
                style="width: 160px; height: 160px; border-radius: 50%; object-fit: cover; margin-bottom: 20px; border: 3px solid var(--accent-pink);">
            <h1>Your BF random ahh thoughts</h1>
            <p>Pick a letter to read</p>
            <div class="month-grid" id="month-menu">
                <!-- Buttons will be generated here by JS -->
            </div>
        </div>
    </div>

    <!-- Wrap existing container in a div so it can hide/show it -->
    <div id="main-interface" class="hidden">
        
        <div class="container">
            <h1 class="title">My Monthly Appreciation to you</h1>

            <!-- New wrapper for the side-by-side layout -->
            <div class="main-content">
                <!-- Left Side: Photography -->
                <div class="polaroid-frame" id="main-photo">
                    <img src="" alt="">
                    <p class="caption" id="photo-caption">Year One: The Beginning</p>
                </div>

                <!-- Right Side: The Letter -->
                <div class="letter-box">
                    <h2 id="letter-title" style="color: #ff85a1; margin-bottom: 10px;"></h2>
                    <p id="typed-text"></p>
                </div>
            </div>

            <!-- Navigation -->
            <div class="navigation">
                <button onclick="prevLetter()" class="nav-btn">Previous Month</button>
                <button onclick="goHome()" class="nav-btn home-nav-btn">Back to Collection</button>
                <button onclick="nextLetter()" class="nav-btn">Next Month</button>
            </div>
        </div>
    </div>    
        <script src="letters.js"></script>
</body>
</html>
